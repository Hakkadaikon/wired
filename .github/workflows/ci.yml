name: CI

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-format just
          pip install lizard

      - name: fmt-check
        run: just fmt-check

      - name: compile (freestanding, proves libc independence)
        run: just compile

      - name: test (hosted unity build)
        run: just test

      - name: ccn (lizard, CCN <= 3)
        run: just ccn
