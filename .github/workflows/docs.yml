name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same pinned toolchain as CI and local dev (flake.nix/flake.lock).
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Generate API reference
        run: nix develop -c just docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/sdk

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
