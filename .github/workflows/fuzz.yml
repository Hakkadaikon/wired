name: Fuzz

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same pinned toolchain as CI and local dev (flake.nix/flake.lock).
      - uses: DeterminateSystems/nix-installer-action@main

      - name: run fuzz harnesses (120s each, bounded regression sweep)
        run: nix develop -c just fuzz-ci 120

      - name: upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: fuzz/crash-*
          if-no-files-found: ignore
